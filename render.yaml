services:
  - type: web
    name: infynux
    runtime: node
    buildCommand: bun install && bun run build
    startCommand: node start-server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
